# 환율 설정
fx_rules:
  baseline: 1420
  zones:
    full_convert: 1380 # 미만: 쌓인 원화 전액 환전
    normal_full: 1420 # 1380~1420: 80만원 전액 환전
    normal_half: 1450 # 1420~1450: 40만원만 환전
    pause: 1450 # 초과: 환전 보류

# ISA 환율 전환 기준
isa_fx_switch:
  threshold: 1380 # 이상이면 449180(환헤지), 미만이면 360750(환노출)

# SPYM 원화 환산 기준 환율 (매수 판단용)
spym_fx_rate: 1420

# 추적 종목 (daily tracking + 이메일 표시)
watchlist:
  # ── 지수 ETF ──────────────────────────────
  - ticker: SPYM
    name: "SPDR S&P 500"
    type: core
    holdings: 2
    alert_drop_pct: 10

  - ticker: "360750.KS"
    name: "TIGER 미국S&P500"
    type: isa_core
    holdings: 395
    monthly_trigger: true

  - ticker: "449180.KS"
    name: "KODEX 미국S&P500(H)"
    type: isa_core_hedged
    holdings: 70
    monthly_trigger: true

  - ticker: "133690.KS"
    name: "TIGER 미국나스닥100"
    type: isa_core
    holdings: 47
    sell_trigger:
      rise_50pct_sell: 5 # +5% 시 50% 매도
      rise_all_sell: 10 # +10% 시 전량 매도

  # ── 개별주 ────────────────────────────────
  - ticker: GOOGL
    name: "Alphabet A"
    type: growth
    sector: ai_tech
    holdings: 4
    alert_drop_pct: 7

  - ticker: OXY
    name: "Occidental Petroleum"
    type: satellite
    holdings: 4
    alert_drop_pct: 7

  - ticker: QCOM
    name: "Qualcomm"
    type: individual
    sector: ai_tech
    holdings: 4

  - ticker: SOUN
    name: "SoundHound AI"
    type: speculative
    holdings: 3

  - ticker: NVDA
    name: "NVIDIA"
    type: watchonly
    sector: ai_tech
    holdings: 0

# 거시경제 키워드
macro_keywords:
  - FOMC
  - CPI
  - 연준
  - 환율
  - 금리인상
  - 금리인하

# 이메일 리포트 설정
email_report:
  enabled: true
  recipient: "sawoo9410@gmail.com"
  schedule: "0 7 * * *"

# 텔레그램 알림 설정
telegram_alerts:
  enabled: true
  check_interval: 15
